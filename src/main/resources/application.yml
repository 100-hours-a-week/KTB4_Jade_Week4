spring:
  application:
    name: task

  web:
    resources:
      add-mappings: false

  datasource:
    url: jdbc:h2:mem:test;DB_CLOSE_DELAY=-1;NON_KEYWORDS=USER
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  jackson:
    time-zone: UTC
    serialization:
      write-dates-as-timestamps: false

logging:
  level:
    org:
      springframework:
        web: debug
      hibernate:
        SQL: off
#        orm:
#          jdbc:
#            bind: trace

security:
  jwt:
    secret: ${JWT_SECRET:KtB4JadeLocalJwtSecret20260711_x7Qm9vR2pL5nC8sY3dE6hK1uW4aZ0bT}
    issuer: ktb4-jade-api
    audience: ktb4-jade-api
    access-expiration: 15m

  refresh-token:
    expiration: 7d

  cookie:
    access-name: access_token
    refresh-name: refresh_token
    secure: false  # 현재 HTTP 개발용
    same-site: Lax

  cors:
    allowed-origins:
      - http://127.0.0.1:5500
      - http://localhost:5500